<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title} ?: 'Addiction Tracker'">Addiction Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<nav th:fragment="nav">
    <a th:href="@{/}">Главная</a>
    <th:block th:if="${#authorization.expression('isAuthenticated()')}">
        <a th:href="@{/dashboard}">Личный кабинет</a>
        <a th:href="@{/addictions}">Зависимости</a>
        <a th:href="@{/progress}">Мой прогресс</a>
        <a th:href="@{/challenges}">Челленджи</a>
        <a th:href="@{/motivations}">Моя мотивация</a>
        <a th:href="@{/admin}" th:if="${#authorization.expression('hasRole(''ADMIN'')')}">Админ панель</a>
        <form method="post" th:action="@{/logout}" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Выйти</button>
        </form>
    </th:block>
    <th:block th:unless="${#authorization.expression('isAuthenticated()')}">
        <a th:href="@{/login}">Войти</a>
        <a th:href="@{/register}">Регистрация</a>
    </th:block>
</nav>

<div th:fragment="content">
</div>
</body>
</html>
