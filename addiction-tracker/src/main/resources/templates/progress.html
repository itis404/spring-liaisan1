<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мой прогресс</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<nav th:replace="~{layout :: nav}"></nav>

<div class="container">
    <h2>Мой прогресс</h2>
    <div class="stat-card" style="margin-bottom:20px">
        <h3>Калькулятор экономии</h3>
        <p>Курс доллара сегодня: <strong th:text="${dollarRate}"></strong> ₽</p>
        <div>
            <label>Сколько ты тратил в день на зависимость (в рублях):</label>
            <input type="number" id="dailySpend" placeholder="например: 200" min="0"/>
        </div>
        <div style="margin-top:10px">
            <label>Сколько дней держишься:</label>
            <input type="number" id="daysCount" placeholder="например: 7" min="1"/>
        </div>
        <button class="btn" style="margin-top:10px" onclick="calculateSavings()">Посчитать</button>
        <p id="savingsResult" style="margin-top:10px; font-weight:bold; color:#2ecc71"></p>
    </div>
    <p>Количество срывов: <strong th:text="${relapseCount}"></strong></p>

    <div th:if="${addictions.isEmpty()}">
        <p>Сначала добавь зависимость в <a th:href="@{/addictions}">разделе зависимости</a></p>
    </div>

    <div th:unless="${addictions.isEmpty()}">
        <h3>Добавить запись</h3>
        <form method="post" th:action="@{/progress/add}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div>
                <label>Зависимость:</label>
                <select name="addictionId">
                    <option th:each="a : ${addictions}"
                            th:value="${a.id}"
                            th:text="${a.name}"></option>
                </select>
            </div>
            <div>
                <label>Заметка:</label>
                <input type="text" name="note" placeholder="Как прошёл день?"/>
            </div>
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px">
                <input type="checkbox" name="relapsed" value="true" style="width:20px; height:20px; cursor:pointer"/>
                <label style="font-weight:bold; margin:0">Был срыв</label>
            </div>
            <button type="submit" class="btn">Добавить</button>
        </form>
    </div>

    <h3>История записей</h3>
    <div th:if="${entries.isEmpty()}">
        <p>Записей пока нет</p>
    </div>
    <div th:each="entry : ${entries}" class="stat-card" style="margin-bottom:10px">
        <p th:text="${entry.addiction.name}"></p>
        <p th:text="${entry.note}"></p>
        <p th:text="${entry.relapsed} ? 'Срыв' : 'Держусь!'"></p>
        <p th:text="${#temporals.format(entry.createdAt, 'dd.MM.yyyy HH:mm')}"></p>
        <a th:href="@{/progress/edit/{id}(id=${entry.id})}" class="btn" style="background-color:#f39c12">Редактировать</a>
        <form method="post" th:action="@{/progress/delete/{id}(id=${entry.id})}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn" style="background-color:#e74c3c">Удалить</button>
        </form>
    </div>
</div>
</body>
</html>
